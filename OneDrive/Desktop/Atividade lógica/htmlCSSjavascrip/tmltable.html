<!DOCTYPE html>
<html lang="eng">
  <head>
      <title>table</title>
      
      <style>
      table{
         border: 3px solid;
                 border-collapse: collapse;

        background-color: rgb(157, 219, 228); 
        font-family:Arial,sans-serif ;
        font-size: 30px;
        font-weight: bold;
      }

      #Ocean{
        color: rgb(8, 117, 219);
      }
      #AV{
        color: rgb(31, 6, 255);
      }
      #MA{
        color: rgb(179, 182, 33);
      }
      #foo{
        color: rgb(255, 0, 0);
      }

      td, th{
        border: 3px solid black;
      }
      </style>
    </head>

             <tr>

</html>
